{% extends "base.html" %}
{% block content %}
<section class="panel">
  <h1>Settings</h1>
  <p class="muted"><a href="/village">← Back to the village</a></p>

  <h2>Notifications</h2>
  <p class="muted">Choose which alerts you want. Unchecked kinds won't be recorded for you.</p>
  <form method="post" action="/settings/notifications" class="form">
    {% for n in notifications %}
    <label class="checkbox">
      <input type="checkbox" name="{{ n.token }}" value="1" {% if n.enabled %}checked{% endif %}>
      {{ n.label }}
    </label>
    {% endfor %}
    <button class="btn btn--primary" type="submit">Save</button>
  </form>
</section>
{% endblock %}
