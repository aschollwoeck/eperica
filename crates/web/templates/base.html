<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Eperica</title>
  <link rel="stylesheet" href="/static/base.css">
  <link rel="stylesheet" href="/static/theme-ash.css">
</head>
<body>
  <header class="topbar">
    <a class="topbar__brand" href="/">Eperica</a>
    <nav class="topbar__nav">
      <!-- Public links — shown to everyone. -->
      <a href="/leaderboard">Leaderboards</a> <a href="/wonder">Wonder</a>
      <!-- Member links — revealed by JS (/me) only when logged in (035). Hidden by default to avoid
           showing account-only links to visitors. -->
      <span class="topbar__group" data-auth="in" hidden>
        <a href="/village">Village</a> <a href="/worlds">Worlds</a> <a href="/notifications" title="Notifications">🔔 <span id="notif-badge" class="badge" hidden></span></a> <a href="/messages">Messages <span id="unread-badge" class="badge" hidden></span></a> <a href="/profile">Profile</a> <a href="/settings">Settings</a> <a href="/sitting">Sitting</a> <a href="/mod" id="nav-mod" hidden>Moderation</a> <a href="/admin" id="nav-admin" hidden>Admin</a>
        <form method="post" action="/logout" class="topbar__logout"><button type="submit">Log out</button></form>
      </span>
      <!-- Visitor links — revealed by JS only when logged out. -->
      <span class="topbar__group" data-auth="out" hidden><a href="/login">Log in</a> <a href="/register">Register</a></span>
      <form method="get" action="/search" class="topbar__search"><input type="text" name="q" placeholder="Search…" autocomplete="off"></form></nav>
  </header>
  <div id="sitting-banner" class="banner" hidden></div>
  <div id="flash" class="container" hidden></div>
  <main class="container">
    {% block content %}{% endblock %}
  </main>
  <footer class="footer">Eperica — a faithful Travian-style strategy MMO</footer>
  <script>
    // 035: auth-aware nav — ask /me who the viewer is and reveal the matching link group. Default is
    // everything hidden, so a visitor never sees member-only links (and vice versa). Best-effort: on
    // failure the public links remain and the rest stays hidden.
    (function () {
      function show(sel, on) {
        document.querySelectorAll(sel).forEach(function (el) { el.hidden = !on; });
      }
      fetch("/me", { headers: { Accept: "application/json" } })
        .then(function (r) { return r.ok ? r.json() : null; })
        .then(function (me) {
          if (!me) return;
          show('[data-auth="in"]', !!me.authed);
          show('[data-auth="out"]', !me.authed);
          var mod = document.getElementById("nav-mod");
          if (mod) mod.hidden = !(me.authed && me.moderator);
          var adm = document.getElementById("nav-admin");
          if (adm) adm.hidden = !(me.authed && me.admin);
        })
        .catch(function () {});
    })();

    // 034: one-shot flash message — show + clear the `flash` cookie set when an action was rejected.
    (function () {
      var box = document.getElementById("flash");
      if (!box) return;
      var m = document.cookie.split("; ").find(function (c) { return c.indexOf("flash=") === 0; });
      // Clear it immediately so it shows once.
      document.cookie = "flash=; Path=/; Max-Age=0; SameSite=Lax";
      if (!m) return;
      var msg = "";
      try { msg = decodeURIComponent(m.slice("flash=".length)); } catch (_) { return; }
      if (!msg) return;
      box.className = "container";
      var alert = document.createElement("div");
      alert.className = "alert alert--danger";
      alert.setAttribute("role", "alert");
      alert.textContent = msg;
      box.appendChild(alert);
      box.hidden = false;
    })();

    // Poll the total unread for the Messages nav badge (024). Best-effort; ignored when logged out.
    (function () {
      var badge = document.getElementById("unread-badge");
      if (!badge) return;
      function refresh() {
        fetch("/messages/unread").then(function (r) { return r.ok ? r.text() : "0"; })
          .then(function (t) {
            var n = parseInt(t, 10) || 0;
            if (n > 0) { badge.textContent = n; badge.hidden = false; } else { badge.hidden = true; }
          }).catch(function () {});
      }
      refresh();
      setInterval(refresh, 20000);
    })();

    // Notifications bell (026): poll the unread count, and refresh promptly when a live nudge arrives
    // over SSE. Best-effort; the count is authoritative from the poll.
    (function () {
      var badge = document.getElementById("notif-badge");
      if (!badge) return;
      function refresh() {
        fetch("/notifications/unread").then(function (r) { return r.ok ? r.text() : "0"; })
          .then(function (t) {
            var n = parseInt(t, 10) || 0;
            if (n > 0) { badge.textContent = n; badge.hidden = false; } else { badge.hidden = true; }
          }).catch(function () {});
      }
      refresh();
      setInterval(refresh, 20000);
      try {
        var es = new EventSource("/notifications/stream");
        es.onmessage = function () { refresh(); };
      } catch (_) {}
    })();

    // Account-sitting banner (030): when sitting, show a persistent "you are operating X's account" bar
    // with a Stop control. Best-effort poll; ignored when logged out / not sitting.
    (function () {
      var bar = document.getElementById("sitting-banner");
      if (!bar) return;
      function refresh() {
        fetch("/sitting/status").then(function (r) { return r.ok ? r.text() : ""; })
          .then(function (name) {
            name = (name || "").trim();
            if (name) {
              bar.textContent = "You are operating " + name + "'s account. ";
              var f = document.createElement("form");
              f.method = "post"; f.action = "/sitting/stop"; f.style.display = "inline";
              var b = document.createElement("button"); b.type = "submit"; b.textContent = "Stop sitting";
              f.appendChild(b); bar.appendChild(f);
              bar.hidden = false;
            } else {
              bar.textContent = ""; bar.hidden = true;
            }
          }).catch(function () {});
      }
      refresh();
      setInterval(refresh, 20000);
    })();
  </script>
</body>
</html>
