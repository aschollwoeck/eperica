<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Eperica</title>
  <link rel="stylesheet" href="/static/base.css">
  <link rel="stylesheet" href="/static/theme-ash.css">
</head>
<body>
  <header class="topbar">
    <a class="topbar__brand" href="/">Eperica</a>
    <nav class="topbar__nav"><a href="/leaderboard">Leaderboards</a> <a href="/wonder">Wonder</a> <a href="/notifications" title="Notifications">🔔 <span id="notif-badge" class="badge" hidden></span></a> <a href="/messages">Messages <span id="unread-badge" class="badge" hidden></span></a> <a href="/profile">Profile</a> <a href="/settings">Settings</a> <a href="/sitting">Sitting</a>
      <form method="get" action="/search" class="topbar__search"><input type="text" name="q" placeholder="Search…" autocomplete="off"></form></nav>
  </header>
  <div id="sitting-banner" class="banner" hidden></div>
  <main class="container">
    {% block content %}{% endblock %}
  </main>
  <footer class="footer">Eperica — a faithful Travian-style strategy MMO</footer>
  <script>
    // Poll the total unread for the Messages nav badge (024). Best-effort; ignored when logged out.
    (function () {
      var badge = document.getElementById("unread-badge");
      if (!badge) return;
      function refresh() {
        fetch("/messages/unread").then(function (r) { return r.ok ? r.text() : "0"; })
          .then(function (t) {
            var n = parseInt(t, 10) || 0;
            if (n > 0) { badge.textContent = n; badge.hidden = false; } else { badge.hidden = true; }
          }).catch(function () {});
      }
      refresh();
      setInterval(refresh, 20000);
    })();

    // Notifications bell (026): poll the unread count, and refresh promptly when a live nudge arrives
    // over SSE. Best-effort; the count is authoritative from the poll.
    (function () {
      var badge = document.getElementById("notif-badge");
      if (!badge) return;
      function refresh() {
        fetch("/notifications/unread").then(function (r) { return r.ok ? r.text() : "0"; })
          .then(function (t) {
            var n = parseInt(t, 10) || 0;
            if (n > 0) { badge.textContent = n; badge.hidden = false; } else { badge.hidden = true; }
          }).catch(function () {});
      }
      refresh();
      setInterval(refresh, 20000);
      try {
        var es = new EventSource("/notifications/stream");
        es.onmessage = function () { refresh(); };
      } catch (_) {}
    })();

    // Account-sitting banner (030): when sitting, show a persistent "you are operating X's account" bar
    // with a Stop control. Best-effort poll; ignored when logged out / not sitting.
    (function () {
      var bar = document.getElementById("sitting-banner");
      if (!bar) return;
      function refresh() {
        fetch("/sitting/status").then(function (r) { return r.ok ? r.text() : ""; })
          .then(function (name) {
            name = (name || "").trim();
            if (name) {
              bar.textContent = "You are operating " + name + "'s account. ";
              var f = document.createElement("form");
              f.method = "post"; f.action = "/sitting/stop"; f.style.display = "inline";
              var b = document.createElement("button"); b.type = "submit"; b.textContent = "Stop sitting";
              f.appendChild(b); bar.appendChild(f);
              bar.hidden = false;
            } else {
              bar.textContent = ""; bar.hidden = true;
            }
          }).catch(function () {});
      }
      refresh();
      setInterval(refresh, 20000);
    })();
  </script>
</body>
</html>
