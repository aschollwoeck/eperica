{% extends "base.html" %}
{% block content %}
<section class="panel">
  <h1>{{ title }}{% if locked %} <span class="badge">Announcement</span>{% endif %}</h1>
  <p class="muted"><a href="/w/{{ world }}/alliance/forum">← All threads</a></p>

  <ul class="messages">
    {% for p in posts %}
    <li class="theirs">
      <span class="muted sender">{{ p.author }}:</span> {{ p.body }}
    </li>
    {% endfor %}
  </ul>

  {% if locked %}
  <p class="muted">This is an announcement — replies are closed.</p>
  {% else %}
  <form method="post" action="/w/{{ world }}/alliance/forum/{{ thread_id }}/reply" class="send">
    <textarea name="body" rows="3" placeholder="Reply…" maxlength="2000" required></textarea>
    <button type="submit">Reply</button>
  </form>
  {% endif %}
</section>
{% endblock %}
