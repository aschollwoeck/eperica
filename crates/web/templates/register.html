{% extends "base.html" %}
{% block content %}
<section class="panel">
  <h1>Create account</h1>
  {% if let Some(message) = error %}<p class="alert alert--danger">{{ message }}</p>{% endif %}
  <form method="post" action="/register" class="form">
    <div class="field">
      <label for="username">Username</label>
      <input id="username" name="username" required autofocus>
    </div>
    <div class="field">
      <label for="email">Email</label>
      <input id="email" name="email" type="email" required>
    </div>
    <div class="field">
      <label for="password">Password</label>
      <input id="password" name="password" type="password" required minlength="8">
    </div>
    <fieldset class="field">
      <legend>Tribe</legend>
      <label><input type="radio" name="tribe" value="romans" required>
        <strong>Romans</strong> — balanced all-rounders; build a field and a building at once.</label>
      <label><input type="radio" name="tribe" value="teutons" required>
        <strong>Teutons</strong> — cheap, aggressive raiders.</label>
      <label><input type="radio" name="tribe" value="gauls" required>
        <strong>Gauls</strong> — fast, defensive specialists. Recommended for beginners.</label>
    </fieldset>
    <button class="btn btn--primary" type="submit">Register</button>
  </form>
  <p><a href="/login">Already have an account? Log in</a></p>
</section>
{% endblock %}
