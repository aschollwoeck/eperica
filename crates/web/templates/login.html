{% extends "base.html" %}
{% block body_class %}bld-page{% endblock %}
{% block content %}
<div class="auth">
  {% include "_brand.html" %}
  <section class="auth-card">
    <h1 class="auth-card__title">Log in</h1>
    <p class="auth-card__sub">Welcome back, commander.</p>
    {% if let Some(message) = error %}<p class="alert alert--danger">{{ message }}</p>{% endif %}
    <form method="post" action="/login" class="form">
      <div class="field">
        <label for="username">Username</label>
        <input id="username" name="username" autocomplete="username" required autofocus>
      </div>
      <div class="field">
        <label for="password">Password</label>
        <input id="password" name="password" type="password" autocomplete="current-password" required>
      </div>
      <button class="btn btn--primary btn--wide" type="submit">Log in</button>
    </form>
    <p class="auth-card__alt"><a href="/register">Need an account? Create one →</a></p>
  </section>
</div>
{% endblock %}
