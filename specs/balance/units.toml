# Unit balance (interim, tunable) — per-tribe rosters (GDD §5/§6) and Smithy upgrade tables.
#
# Each tribe has exactly 10 units; the unit WITHOUT a [research] entry is the tribe's tier-1 unit,
# researched from the start (004 AC9). `speed` is map fields/hour; `crop_upkeep` is crop/hour;
# costs are per unit trained. Research `requirements` are building levels (current building max is
# 10, so every requirement stays reachable). Stats follow the classic Travian profile.
#
# Smithy upgrades: cost = unit training cost x cost_permille/1000 (per resource), per target level;
# durations are global per target level. Max unit level = table length (20), additionally capped by
# the Smithy's building level.

# Training-speed multiplier by training-building level (index = level; >= 1, higher => faster).
# Shared by Barracks/Stable/Workshop. Index 0 and 1 equal: level 1 is the baseline.
[training]
building_factor = [1.0, 1.0, 1.11, 1.23, 1.37, 1.52, 1.69, 1.87, 2.08, 2.31, 2.57]

[smithy]
cost_permille_per_level = [
    1500, 1900, 2410, 3060, 3890, 4940, 6270, 7960, 10110, 12840,
    16310, 20710, 26300, 33400, 42420, 53870, 68420, 86890, 110350, 140140,
]
time_secs_per_level = [
    3600, 4180, 4850, 5620, 6520, 7560, 8770, 10170, 11800, 13690,
    15880, 18420, 21370, 24790, 28760, 33360, 38700, 44890, 52070, 60400,
]

