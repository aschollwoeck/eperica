# Account-lifecycle balance (019, GDD §12.2–12.3; real-time inactivity per 054) — interim, tunable.
#
# `beginner_protection_secs` is a BASE duration scaled by world speed (P7) — a faster server protects for
# less wall-clock. The inactivity/abandonment `_secs` and `sweep_interval_secs` are **real wall-clock time**
# (054): they gate on a real person's login recency, so a faster server does NOT grey/abandon them sooner.

[protection]
# Beginner's attack-immunity window granted at spawn (3 days base; ×speed-scaled down).
beginner_protection_secs = 259200
# Population at which a protected player is "established" — protection ends early past this.
population_threshold = 200

[inactivity]
# Idle this long (real time) ⇒ the player is inactive (farmable / greyed on the map). 7 days.
inactive_after_secs = 604800
# Idle this long (real time) ⇒ the account is abandoned (villages removed, valleys freed). 30 days.
abandon_after_secs = 2592000
# The abandonment-sweep cadence / period length (real time). 1 day.
sweep_interval_secs = 86400

[presence]
# Active within this many seconds (real time) ⇒ shown "online" (025). 10 minutes — comfortably above the
# 5-minute activity-touch throttle so an actively-browsing player reliably reads as online.
online_secs = 600
