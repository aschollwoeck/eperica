# World-map generation balance (interim, tunable). The whole terrain is a pure function of the
# world seed; these tables drive it (slice 006). Densities are per-mille of all tiles; the
# remainder are valleys. Selection is seeded and integer-only (P6).

# ~12% oasis, ~0.5% Natar, the rest valleys.
oasis_permille = 120
natar_permille = 5

# Weighted valley field distributions (woodcutters / clay pits / iron mines / croplands). Each
# MUST sum to 18 (GDD §3.1). The balanced 4-4-4-6 dominates; croppers are rare.
