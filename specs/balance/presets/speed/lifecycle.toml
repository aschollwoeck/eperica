# Account-lifecycle balance (019, GDD §12.2–12.3; real-time inactivity per 054) — SPEED preset (052).
#
# `beginner_protection_secs` is speed-scaled (P7) and this preset additionally shortens its base. The
# inactivity/abandonment windows are **real wall-clock time** (054, not speed-scaled); the speed preset keeps
# them shorter in real time too — a blitz round is shorter, so idle accounts are reclaimed sooner in real
# days. Compare specs/balance/presets/classic/.

[protection]
# Beginner's attack-immunity window granted at spawn — 1 day base, speed-scaled (classic: 3 days).
beginner_protection_secs = 86400
# Population at which a protected player is "established" — protection ends early past this (classic: 200).
population_threshold = 100

[inactivity]
# Idle this long (real time) ⇒ the player is inactive (farmable / greyed). 3 days (classic: 7).
inactive_after_secs = 259200
# Idle this long (real time) ⇒ the account is abandoned (villages removed, valleys freed). 10 days (classic: 30).
abandon_after_secs = 864000
# The abandonment-sweep cadence / period length (real time). 12 hours (classic: 1 day).
sweep_interval_secs = 43200

[presence]
# Active within this many seconds (real time) ⇒ shown "online" (025). 10 minutes — comfortably above the
# 5-minute activity-touch throttle so an actively-browsing player reliably reads as online.
online_secs = 600
