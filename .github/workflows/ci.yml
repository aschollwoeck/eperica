name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  check:
    name: fmt · clippy · build · test
    runs-on: ubuntu-latest

    # Postgres for the DB-backed tests. `#[sqlx::test]` creates an isolated, freshly-migrated
    # database per test (and drops it after), so the suite runs fully in parallel — no shared
    # state, no `--test-threads=1`. The `eperica` role owns the server and so may CREATE/DROP the
    # per-test databases. Without this service `DATABASE_URL` is unset and every DB test silently
    # skips, so they were never exercised in CI before.
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: eperica
          POSTGRES_PASSWORD: eperica
          POSTGRES_DB: eperica
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U eperica"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgres://eperica:eperica@localhost:5432/eperica

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Format
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Build
        run: cargo build --workspace --locked

      - name: Test
        run: cargo test --workspace --locked
